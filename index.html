<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI Assistant PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Segoe UI,Arial;
  background:#212121;
  color:#fff;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#171717;
  border-right:1px solid #2a2a2a;
  display:flex;
  flex-direction:column;
  padding:12px;
}

.brand{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}

.new-chat{
  background:#2b2b2b;
  border:1px solid #444;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:10px;
}

.chat-list{
  flex:1;
  overflow:auto;
}

.chat-item{
  padding:10px;
  border-radius:8px;
  background:#222;
  margin-bottom:6px;
  cursor:pointer;
}

.chat-item:hover{
  background:#333;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #333;
}

.chat{
  flex:1;
  overflow:auto;
  padding:20px;
}

.message{
  margin-bottom:15px;
  padding:12px;
  border-radius:10px;
}

.user{background:#343541}
.assistant{background:#2b2b2b}

pre{
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  overflow:auto;
}

.input-box{
  display:flex;
  padding:10px;
  border-top:1px solid #333;
}

textarea{
  flex:1;
  background:#2b2b2b;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  background:#fff;
  color:#000;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="brand">Smart AI</div>
  <button class="new-chat" onclick="newChat()">+ New Chat</button>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>AI Assistant</div>
    <button onclick="setAPI()">Set API</button>
  </div>

  <div class="chat" id="chatBox"></div>

  <div class="input-box">
    <textarea id="input" placeholder="Ask anything..."></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const API_URL="https://api.groq.com/openai/v1/chat/completions";
let chats=JSON.parse(localStorage.getItem("chats")||"[]");
let current=null;

function save(){localStorage.setItem("chats",JSON.stringify(chats))}

function newChat(){
  const id=Date.now();
  chats.unshift({id,title:"New Chat",messages:[]});
  current=id;
  save();
  renderChats();
  renderMessages();
}

function renderChats(){
  const list=document.getElementById("chatList");
  list.innerHTML="";
  chats.forEach(c=>{
    const d=document.createElement("div");
    d.className="chat-item";
    d.innerText=c.title;
    d.onclick=()=>{current=c.id;renderMessages()};
    list.appendChild(d);
  });
}

function getChat(){
  return chats.find(c=>c.id===current);
}

function renderMessages(){
  const box=document.getElementById("chatBox");
  box.innerHTML="";
  const chat=getChat();
  if(!chat)return;

  chat.messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="message "+m.role;

    if(m.role==="assistant"){
      renderCode(div,m.content);
    }else{
      div.innerText=m.content;
    }

    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
}

function renderCode(div,text){
  const parts=text.split("```");
  parts.forEach((p,i)=>{
    if(i%2){
      const pre=document.createElement("pre");
      pre.innerText=p.replace(/^[a-z]+\n/,"");
      div.appendChild(pre);
    }else{
      div.append(p);
    }
  });
}

function setAPI(){
  const key=prompt("Enter Groq API Key:");
  localStorage.setItem("api",key);
}

async function send(){
  const input=document.getElementById("input");
  const msg=input.value.trim();
  if(!msg)return;

  const chat=getChat();

  chat.messages.push({role:"user",content:msg});
  if(chat.title==="New Chat")chat.title=msg.slice(0,25);

  input.value="";
  renderChats();
  renderMessages();

  const loading={role:"assistant",content:"Thinking..."};
  chat.messages.push(loading);
  renderMessages();

  try{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+localStorage.getItem("api")
      },
      body:JSON.stringify({
        model:"llama-3.3-70b-versatile",
        messages:[
          {role:"system",content:"You are a smart human-like AI assistant. Be natural and helpful."},
          ...chat.messages.filter(m=>m!==loading)
        ]
      })
    });

    const data=await res.json();
    loading.content=data.choices[0].message.content;

  }catch(e){
    loading.content="Error: "+e.message;
  }

  save();
  renderMessages();
}

if(!chats.length)newChat();
else current=chats[0].id;

renderChats();
renderMessages();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart AI Assistant PRO MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#212121;
  color:#fff;
  font-family:Inter,Segoe UI;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#171717;
  border-right:1px solid #2a2a2a;
  padding:12px;
  display:flex;
  flex-direction:column;
}

.brand{font-size:18px;font-weight:700;margin-bottom:10px}

.new-chat{
  padding:10px;
  border:none;
  background:#2b2b2b;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  margin-bottom:10px;
}

.chat-list{
  flex:1;
  overflow:auto;
}

.chat-item{
  background:#222;
  padding:10px;
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-item:hover{background:#333}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:60px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

.chat{
  flex:1;
  overflow:auto;
  padding:20px;
}

.message{
  margin-bottom:15px;
  padding:12px;
  border-radius:10px;
  position:relative;
}

.user{background:#343541}
.assistant{background:#2b2b2b}

.time{
  font-size:10px;
  opacity:0.6;
  margin-top:5px;
}

/* CODE */
pre{
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  overflow:auto;
}

.copy-btn{
  position:absolute;
  right:10px;
  top:10px;
  font-size:12px;
  background:#444;
  border:none;
  padding:4px 8px;
  cursor:pointer;
  border-radius:6px;
}

/* INPUT */
.input-box{
  display:flex;
  padding:10px;
  border-top:1px solid #333;
}

textarea{
  flex:1;
  background:#2b2b2b;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

button{
  margin-left:10px;
  padding:10px;
  border:none;
  background:#fff;
  color:#000;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="brand">AI PRO MAX</div>
  <button class="new-chat" onclick="newChat()">+ New Chat</button>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>Smart AI Assistant</div>
    <button onclick="setAPI()">Set API</button>
  </div>

  <div class="chat" id="chatBox"></div>

  <div class="input-box">
    <textarea id="input" placeholder="Ask anything..."></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const API="https://api.groq.com/openai/v1/chat/completions";

let chats=JSON.parse(localStorage.getItem("pro_chats")||"[]");
let current=null;

function save(){localStorage.setItem("pro_chats",JSON.stringify(chats))}

function newChat(){
  const id=Date.now();
  chats.unshift({id,title:"New Chat",messages:[]});
  current=id;
  save();
  renderChats();
  renderMessages();
}

function renderChats(){
  const list=document.getElementById("chatList");
  list.innerHTML="";
  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chat-item";

    const span=document.createElement("span");
    span.textContent=c.title;

    const del=document.createElement("button");
    del.textContent="✕";
    del.onclick=(e)=>{
      e.stopPropagation();
      chats=chats.filter(x=>x.id!==c.id);
      save();
      renderChats();
      if(current===c.id)newChat();
    };

    div.onclick=()=>{current=c.id;renderMessages()};

    div.appendChild(span);
    div.appendChild(del);
    list.appendChild(div);
  });
}

function getChat(){
  return chats.find(c=>c.id===current);
}

function time(){
  return new Date().toLocaleTimeString();
}

function renderMessages(){
  const box=document.getElementById("chatBox");
  box.innerHTML="";
  const chat=getChat();
  if(!chat)return;

  chat.messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="message "+m.role;

    if(m.role==="assistant"){
      renderCode(div,m.content);
    }else{
      div.innerText=m.content;
    }

    const t=document.createElement("div");
    t.className="time";
    t.textContent=m.time;
    div.appendChild(t);

    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
}

function renderCode(div,text){
  const parts=text.split("```");
  parts.forEach((p,i)=>{
    if(i%2){
      const pre=document.createElement("pre");
      pre.innerText=p.replace(/^[a-z]+\n/,"");

      const copy=document.createElement("button");
      copy.textContent="Copy";
      copy.className="copy-btn";
      copy.onclick=()=>navigator.clipboard.writeText(pre.innerText);

      div.appendChild(copy);
      div.appendChild(pre);
    }else{
      div.append(p);
    }
  });
}

function setAPI(){
  const key=prompt("Enter Groq API Key");
  localStorage.setItem("groq_key",key);
}

async function send(){
  const input=document.getElementById("input");
  const msg=input.value.trim();
  if(!msg)return;

  const chat=getChat();

  chat.messages.push({role:"user",content:msg,time:time()});
  if(chat.title==="New Chat")chat.title=msg.slice(0,30);

  input.value="";
  renderChats();
  renderMessages();

  const loading={role:"assistant",content:"Typing...",time:time()};
  chat.messages.push(loading);
  renderMessages();

  try{
    const res=await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+localStorage.getItem("groq_key")
      },
      body:JSON.stringify({
        model:"llama-3.3-70b-versatile",
        temperature:0.6,
        messages:[
          {
            role:"system",
            content:"You are a smart, human-like AI. Be natural, friendly, and understand context."
          },
          ...chat.messages.filter(m=>m!==loading)
        ]
      })
    });

    const data=await res.json();
    loading.content=data.choices[0].message.content;

  }catch(e){
    loading.content="Error: "+e.message;
  }

  save();
  renderMessages();
}

if(!chats.length)newChat();
else current=chats[0].id;

renderChats();
renderMessages();
</script>

</body>
</html>
